<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pagamento via PIX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}

h2 {
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.qr {
  margin-top: 20px;
}

.copy {
  background: #334155;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  font-size: 12px;
  word-break: break-all;
}

.status {
  margin-top: 10px;
  font-weight: bold;
}

.loading {
  margin-top: 10px;
  color: #facc15;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 Gerar PIX</h2>

<form id="pixForm">
  <input name="nome" placeholder="Nome" required>
  <input name="email" placeholder="Email" required>
  <input name="cpf" placeholder="CPF" required>
  <input name="valor" placeholder="Valor (ex: 15)" required>
  <button type="submit">Gerar PIX</button>
</form>

<div id="resultado"></div>

</div>

<script>

const API_URL = "https://wallace-nontypographic-unskilfully.ngrok-free.dev";

let transactionId = null;

// ============================
// GERAR PIX
// ============================

document.getElementById("pixForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  document.getElementById("resultado").innerHTML =
    "<p class='loading'>Gerando pagamento...</p>";

  try {

    const res = await fetch(API_URL + "/criar-pix", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const json = await res.json();

    transactionId = json.id;

    document.getElementById("resultado").innerHTML = `
      <div class="qr">
        <p><b>Status:</b> <span id="status">${json.status}</span></p>

        <img src="data:image/png;base64,${json.pix.qrcode}" width="200">

        <div class="copy" id="pixCode">${json.pix.emv}</div>

        <button onclick="copiar()">Copiar Código</button>

        <p class="loading">Aguardando pagamento...</p>
      </div>
    `;

    verificarStatus();

  } catch (err) {
    document.getElementById("resultado").innerHTML =
      "<p style='color:red'>Erro ao gerar PIX</p>";
  }
});

// ============================
// COPIAR PIX
// ============================

function copiar() {
  const text = document.getElementById("pixCode").innerText;
  navigator.clipboard.writeText(text);
  alert("Código PIX copiado!");
}

// ============================
// VERIFICAR STATUS
// ============================

async function verificarStatus() {
  if (!transactionId) return;

  try {
    const res = await fetch(API_URL + "/status/" + transactionId);
    const json = await res.json();

    document.getElementById("status").innerText = json.status;

    if (json.status === "paid") {
      document.getElementById("resultado").innerHTML +=
        "<p style='color:#22c55e; font-weight:bold'>✅ PAGAMENTO APROVADO</p>";
      return;
    }

    setTimeout(verificarStatus, 5000);

  } catch (err) {
    setTimeout(verificarStatus, 5000);
  }
}

</script>

</body>
</html>
