<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador PIX</title>
</head>
<body>
<h2>Gerar PIX</h2>
<form id="pixForm">
  <input name="nome" placeholder="Nome" required>
  <input name="email" placeholder="Email" required>
  <input name="cpf" placeholder="CPF" required>
  <input name="valor" placeholder="Valor" required>
  <button type="submit">Gerar PIX</button>
</form>

<div id="resultado"></div>

<script>
document.getElementById("pixForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  try {
    const res = await fetch("https://api.quantumpayments.com.br/v1/transactions", {
      method: "POST",
      headers: {
        "Authorization": "Basic sk_nI4bptfQQx0qXk0rf6rQ5XTrojMbW2QtP8R5X-GvD0TVY4_-", // cuidado: expõe a chave
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        amount: parseInt(data.valor) * 100,
        paymentMethod: "pix",
        pix: { expiresInDays: 1 },
        customer: {
          name: data.nome,
          email: data.email,
          document: data.cpf
        },
        items: [{
          title: "Pagamento",
          unitPrice: parseInt(data.valor) * 100,
          quantity: 1
        }]
      })
    });

    const json = await res.json();
    document.getElementById("resultado").innerText = JSON.stringify(json, null, 2);
  } catch (err) {
    alert("Erro: " + err.message);
  }
});
</script>
</body>
</html>
