<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descubra seu caminho no digital</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  text-align:center;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
}

h1{
  color:#22c55e;
}

.btn{
  display:block;
  background:#22c55e;
  padding:15px;
  margin:10px 0;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
}

.btn:hover{
  background:#16a34a;
}

.hidden{
  display:none;
}

.progress{
  height:6px;
  background:#334155;
  margin-bottom:20px;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#22c55e;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<h1 id="pergunta">Você já tentou ganhar dinheiro online?</h1>

<div id="opcoes"></div>

</div>
</div>

<script>

const perguntas = [
{
  pergunta: "Você já tentou ganhar dinheiro online?",
  opcoes: [
    {texto:"Nunca tentei", valor:1},
    {texto:"Já tentei mas não deu certo", valor:2},
    {texto:"Já ganhei algo", valor:3}
  ]
},
{
  pergunta: "Qual sua maior dificuldade hoje?",
  opcoes: [
    {texto:"Não sei por onde começar", valor:1},
    {texto:"Não consigo vender", valor:2},
    {texto:"Quero escalar resultados", valor:3}
  ]
},
{
  pergunta: "Quanto tempo você pode dedicar?",
  opcoes: [
    {texto:"Menos de 1h por dia", valor:1},
    {texto:"1 a 3 horas", valor:2},
    {texto:"Mais de 3 horas", valor:3}
  ]
}
];

let atual = 0;
let score = 0;

function render(){
  document.getElementById("pergunta").innerText = perguntas[atual].pergunta;
  const opcoesDiv = document.getElementById("opcoes");
  opcoesDiv.innerHTML = "";

  perguntas[atual].opcoes.forEach(op=>{
    const btn = document.createElement("div");
    btn.className = "btn";
    btn.innerText = op.texto;

    btn.onclick = ()=>{
      score += op.valor;
      atual++;
      updateBar();

      if(atual < perguntas.length){
        render();
      } else {
        resultado();
      }
    };

    opcoesDiv.appendChild(btn);
  });
}

function updateBar(){
  let progresso = (atual / perguntas.length) * 100;
  document.getElementById("bar").style.width = progresso + "%";
}

function resultado(){

  let titulo = "";
  let texto = "";
  let link = "";

  if(score <= 4){
    titulo = "Você está começando agora 🚀";
    texto = "O melhor caminho é começar como afiliado gratuito e aprender na prática.";
    link = "https://t.me/+xj2c32fntfhjNzAx";
  }
  else{
    titulo = "Você está pronto pra acelerar 💰";
    texto = "Você já tem perfil para entrar no Time Lucre Mais e participar das divisões.";
    link = "https://pay.cakto.com.br/d563hmw_519305";
  }

  document.querySelector(".card").innerHTML = `
    <h1>${titulo}</h1>
    <p>${texto}</p>
    <a href="${link}" class="btn">CONTINUAR</a>
  `;
}

render();

</script>

</body>
</html>
