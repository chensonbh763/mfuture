<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descubra como você pode ganhar dinheiro online</title>

<style>
body{
  font-family: Arial;
  background:#0d0d0d;
  color:#fff;
  text-align:center;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
}

.card{
  background:#1a1a1a;
  padding:25px;
  border-radius:12px;
}

h1{
  color:#00ffcc;
}

p{
  color:#ccc;
}

.btn{
  display:block;
  background:#00ffcc;
  color:#000;
  padding:15px;
  margin:10px 0;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  cursor:pointer;
}

.btn:hover{
  background:#00ccaa;
}

.progress{
  height:6px;
  background:#333;
  margin-bottom:20px;
  border-radius:10px;
}

.bar{
  height:100%;
  width:0%;
  background:#00ffcc;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<h1 id="titulo">Responda rápido 👇</h1>
<p id="pergunta"></p>

<div id="opcoes"></div>

</div>
</div>

<script>

const perguntas = [

{
pergunta:"Você já tentou ganhar dinheiro online antes?",
opcoes:[
{texto:"Nunca tentei", valor:1},
{texto:"Já tentei mas não deu certo", valor:2},
{texto:"Já ganhei alguma coisa", valor:3}
]
},

{
pergunta:"O que mais te frustra hoje?",
opcoes:[
{texto:"Não sei por onde começar", valor:1},
{texto:"Nada que tento funciona", valor:2},
{texto:"Quero escalar resultados", valor:3}
]
},

{
pergunta:"Quanto tempo você tem por dia?",
opcoes:[
{texto:"Menos de 1h", valor:1},
{texto:"1 a 3h", valor:2},
{texto:"Mais de 3h", valor:3}
]
},

{
pergunta:"Você prefere ganhar dinheiro como?",
opcoes:[
{texto:"Sem precisar vender", valor:1},
{texto:"Com métodos simples", valor:2},
{texto:"Escalando resultados", valor:3}
]
}

];

let atual = 0;
let score = 0;

function render(){
  document.getElementById("pergunta").innerText = perguntas[atual].pergunta;

  const opcoesDiv = document.getElementById("opcoes");
  opcoesDiv.innerHTML = "";

  perguntas[atual].opcoes.forEach(op=>{
    const btn = document.createElement("div");
    btn.className = "btn";
    btn.innerText = op.texto;

    btn.onclick = ()=>{
      score += op.valor;
      atual++;
      atualizarBar();

      if(atual < perguntas.length){
        render();
      } else {
        resultado();
      }
    };

    opcoesDiv.appendChild(btn);
  });
}

function atualizarBar(){
  let progresso = (atual / perguntas.length) * 100;
  document.getElementById("bar").style.width = progresso + "%";
}

function resultado(){

let titulo="";
let texto="";
let link="";
let bonus="";

if(score <= 5){

titulo = "Você está começando agora 🚀";
texto = "Você precisa de métodos simples, testados e fáceis de aplicar — sem depender de experiência.";

bonus = "👉 Dentro do grupo você vai encontrar formas de ganhar dinheiro sem precisar vender nada.";

link = "https://pay.cakto.com.br/da84tmx";

}else{

titulo = "Você está pronto pra ganhar mais 💰";
texto = "Você já tem perfil para aproveitar oportunidades reais e escalar seus ganhos online.";

bonus = "🔥 O grupo VIP te coloca à frente com estratégias e oportunidades antecipadas.";

link = "https://pay.cakto.com.br/da84tmx";

}

document.querySelector(".card").innerHTML = `
<h1>${titulo}</h1>
<p>${texto}</p>
<p>${bonus}</p>

<p style="margin-top:20px;color:#00ffcc;">
Acesso vitalício por apenas R$9,90
</p>

<a href="${link}" class="btn">QUERO ACESSO IMEDIATO</a>

<p style="font-size:12px;color:#aaa;margin-top:10px;">
✔️ Sem mensalidade • ✔️ Acesso imediato • ✔️ Garantia 7 dias
</p>
`;
}

render();

</script>

</body>
</html>
